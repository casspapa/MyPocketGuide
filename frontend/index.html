<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Pocket Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&display=swap" rel="stylesheet">
<style>
/* ── Themes ──────────────────────────────────────────────────────── */
[data-theme="dark"]{--bg:#0A0E0F;--surface:#121A1C;--surface-2:#1A2426;--surface-3:#223030;--text:#EEF0ED;--text-2:#B0BFB8;--text-3:#728880;--accent:#10B870;--accent-dim:#0E9A5E;--gold:#E89040;--border:rgba(16,184,112,0.07);--border-2:rgba(16,184,112,0.14);--icon-col:#B0BFB8;--send-bg:#10B870;--send-fg:#0A0E0F;--page-bg:#080C0D;--knob:#5A7068;--voice-act-bg:#10B870;--voice-act-fg:#0A0E0F;--pulse-col:rgba(16,184,112,0.30);--red:#E05555}
[data-theme="light"]{--bg:#F8FAF8;--surface:#EDF2EE;--surface-2:#E2E8E3;--surface-3:#D8DED9;--text:#141E18;--text-2:#3A4A40;--text-3:#607068;--accent:#046B3E;--accent-dim:#058A4E;--gold:#A06018;--border:rgba(4,107,62,0.08);--border-2:rgba(4,107,62,0.15);--icon-col:#3A4A40;--send-bg:#046B3E;--send-fg:#FFFFFF;--page-bg:#F0F4F0;--knob:#728A78;--voice-act-bg:#046B3E;--voice-act-fg:#FFFFFF;--pulse-col:rgba(4,107,62,0.25);--red:#C04040}
/* ── Reset ────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--page-bg);font-family:'DM Sans',sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;transition:background 0.3s;min-height:100%}
/* ── Phone ────────────────────────────────────────────────────────── */
.phone{width:min(430px,100%);height:min(900px,calc(100dvh - 60px));min-height:580px;border-radius:clamp(24px,5vw,50px);background:var(--bg);border:1.5px solid var(--border-2);box-shadow:0 0 0 6px rgba(0,0,0,0.3),0 32px 80px rgba(0,0,0,0.5);position:relative;overflow:hidden;display:flex;flex-direction:column;transition:background 0.3s}
.phone::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");opacity:0.6;pointer-events:none;z-index:100}
@media(max-width:500px){body{padding:0;justify-content:flex-start;background:var(--bg)}.phone{width:100%;height:100dvh;min-height:0;border-radius:0;border:none;box-shadow:none}.phone::before{display:none}}
.view{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}.view.active{display:flex}
/* ── Gate + Loading ──────────────────────────────────────────────── */
#entry-gate{position:fixed;inset:0;z-index:9999;background:#080C0D;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:'DM Sans',sans-serif;transition:opacity 0.4s}
.gate-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:500;letter-spacing:-0.01em;color:#EEF0ED;display:flex;align-items:center;gap:8px}.gate-logo em{color:#10B870;font-style:normal;font-weight:600}
.gate-sub{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#738394;margin-top:-8px}
.gate-fields{display:flex;flex-direction:column;align-items:center;gap:10px;width:min(280px,80%)}
#gate-btn{width:100%;background:#10B870;border:none;color:#0A0E0F;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;padding:12px;border-radius:8px;cursor:pointer;transition:opacity 0.2s}#gate-btn:disabled{opacity:0.4;cursor:not-allowed}
#gate-error{font-size:11px;color:#E05555;letter-spacing:0.1em;min-height:16px}
#loading-screen{position:fixed;inset:0;z-index:9998;background:#080C0D;display:none;flex-direction:column;align-items:center;justify-content:center;gap:28px;font-family:'DM Sans',sans-serif;transition:opacity 0.5s}
.loading-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:500;letter-spacing:-0.01em;color:#EEF0ED;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}.loading-logo em{color:#10B870;font-style:normal;font-weight:600}
.loading-orb{width:72px;height:72px;position:relative}
.orb-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(16,184,112,0.15);animation:orb-spin 3s linear infinite}
.orb-ring::before{content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#10B870;box-shadow:0 0 8px rgba(16,184,112,0.8)}
.orb-ring:nth-child(2){inset:10px;border-color:rgba(232,144,64,0.2);animation-duration:2s;animation-direction:reverse}.orb-ring:nth-child(2)::before{background:#E89040;box-shadow:0 0 8px rgba(232,144,64,0.8)}
.orb-core{position:absolute;inset:22px;border-radius:50%;background:radial-gradient(circle,rgba(16,184,112,0.15),transparent);animation:orb-pulse 2s ease-in-out infinite}
@keyframes orb-spin{to{transform:rotate(360deg)}}@keyframes orb-pulse{0%,100%{opacity:0.4;transform:scale(0.9)}50%{opacity:1;transform:scale(1.1)}}
.loading-status{font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:#738394;text-align:center;min-height:18px;transition:color 0.4s}.loading-status.ready{color:#4BBF82}
.loading-dots{display:flex;gap:6px;align-items:center}.loading-dots span{width:4px;height:4px;border-radius:50%;background:rgba(16,184,112,0.4);animation:dot-wave 1.4s ease-in-out infinite}.loading-dots span:nth-child(2){animation-delay:0.2s}.loading-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dot-wave{0%,80%,100%{transform:scale(1);opacity:0.4}40%{transform:scale(1.4);opacity:1}}.loading-dots.hidden{opacity:0;transition:opacity 0.3s}
/* ── Header ──────────────────────────────────────────────────────── */
.app-header{padding:10px 20px 12px;padding-top:max(10px,env(safe-area-inset-top,10px));border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;position:relative;z-index:10}
.header-row{display:flex;align-items:center;justify-content:space-between}
.museum-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:500;font-size:clamp(17px,5vw,20px);letter-spacing:-0.01em;color:var(--text);line-height:1;display:flex;align-items:center;gap:8px}.museum-name em{color:var(--accent);font-style:normal;font-weight:600}
.logo-map{flex-shrink:0;color:#D0E0D8}
[data-theme="light"] .logo-map{color:var(--accent)}
.theme-toggle{display:flex;align-items:center;gap:7px;background:transparent;border:none;cursor:pointer;user-select:none;padding:0;flex-shrink:0}
.toggle-track{width:32px;height:18px;border-radius:100px;background:var(--surface-3);border:1px solid var(--border-2);position:relative;transition:background 0.3s;flex-shrink:0}
[data-theme="light"] .toggle-track{background:var(--accent)}
.toggle-thumb{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--knob);transition:left 0.25s ease,background 0.25s}
[data-theme="light"] .toggle-thumb{left:16px;background:#fff}
.toggle-word{font-weight:500;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);min-width:30px}
.header-status{display:flex;align-items:center;gap:6px;margin-top:5px}
.connection-dot{width:6px;height:6px;border-radius:50%;background:#4BBF82;box-shadow:0 0 5px rgba(75,191,130,0.7);flex-shrink:0;animation:blink-slow 2.4s ease-in-out infinite}
.connection-dot.disconnected{background:#E05555;box-shadow:0 0 5px rgba(224,85,85,0.7)}
@keyframes blink-slow{0%,100%{opacity:1}50%{opacity:0.35}}
.connection-label{font-weight:500;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3)}
/* ── Listening strip ─────────────────────────────────────────────── */
.listening-strip{display:flex;align-items:center;justify-content:center;gap:10px;padding:0 20px;background:rgba(196,214,232,0.03);overflow:hidden;max-height:0;opacity:0;transition:max-height 0.3s ease,opacity 0.25s ease;border-bottom:1px solid transparent;flex-shrink:0}
.listening-strip.active{max-height:40px;opacity:1;padding:8px 20px;border-bottom-color:var(--border-2)}
.listening-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent-dim);animation:blink-slow 1.8s ease-in-out infinite;flex-shrink:0}
.voice-bar-label{font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent-dim)}
.voice-wave{display:flex;align-items:center;gap:2.5px;height:18px}
.voice-wave span{display:block;width:2px;border-radius:2px;background:var(--accent);animation:wave 0.7s ease-in-out infinite}
.voice-wave span:nth-child(1){height:4px}.voice-wave span:nth-child(2){height:10px;animation-delay:.08s}.voice-wave span:nth-child(3){height:7px;animation-delay:.16s}.voice-wave span:nth-child(4){height:14px;animation-delay:.04s}.voice-wave span:nth-child(5){height:5px;animation-delay:.12s}.voice-wave span:nth-child(6){height:9px;animation-delay:.20s}.voice-wave span:nth-child(7){height:4px;animation-delay:.06s}
@keyframes wave{0%,100%{transform:scaleY(1);opacity:.5}50%{transform:scaleY(.3);opacity:1}}
/* ── Voice mode ──────────────────────────────────────────────────── */
.voice-main{flex:1;position:relative}
.voice-orb-wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
/* Aura layers — transparent colour that flows outward */
.orb-aura-wrap{position:relative;width:300px;height:300px;display:flex;align-items:center;justify-content:center;transition:all 0.6s ease}
.orb-aura-1{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 35% 40%,rgba(16,184,112,0.18) 0%,transparent 65%),radial-gradient(circle at 70% 30%,rgba(232,144,64,0.10) 0%,transparent 60%),radial-gradient(circle at 50% 75%,rgba(14,154,94,0.14) 0%,transparent 60%);filter:blur(20px);animation:aura-drift-1 8s ease-in-out infinite,aura-breathe 6s ease-in-out infinite;opacity:0.8}
.orb-aura-2{position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle at 60% 35%,rgba(14,154,94,0.14) 0%,transparent 55%),radial-gradient(circle at 30% 65%,rgba(16,184,112,0.18) 0%,transparent 60%),radial-gradient(circle at 75% 70%,rgba(232,144,64,0.10) 0%,transparent 50%);filter:blur(28px);animation:aura-drift-2 10s ease-in-out infinite,aura-breathe-alt 7s ease-in-out infinite;opacity:0.6}
.orb-aura-3{position:absolute;inset:-25px;border-radius:50%;background:radial-gradient(circle at 45% 45%,rgba(232,144,64,0.10) 0%,transparent 50%),radial-gradient(circle at 55% 60%,rgba(16,184,112,0.18) 0%,transparent 50%);filter:blur(35px);animation:aura-drift-3 12s ease-in-out infinite,aura-breathe 8s ease-in-out infinite reverse;opacity:0.4}
/* Speaking — auras expand and pulse in/out */
.orb-aura-wrap.speaking .orb-aura-1{inset:-20px;opacity:1;background:radial-gradient(circle at 35% 40%,rgba(16,184,112,0.35) 0%,transparent 65%),radial-gradient(circle at 70% 30%,rgba(232,144,64,0.22) 0%,transparent 60%),radial-gradient(circle at 50% 75%,rgba(14,154,94,0.28) 0%,transparent 60%);animation:aura-drift-1 4s ease-in-out infinite,aura-speak-pulse 2s ease-in-out infinite}
.orb-aura-wrap.speaking .orb-aura-2{inset:-35px;opacity:0.85;background:radial-gradient(circle at 60% 35%,rgba(14,154,94,0.28) 0%,transparent 55%),radial-gradient(circle at 30% 65%,rgba(16,184,112,0.35) 0%,transparent 60%),radial-gradient(circle at 75% 70%,rgba(232,144,64,0.22) 0%,transparent 50%);animation:aura-drift-2 5s ease-in-out infinite,aura-speak-pulse-alt 2.5s ease-in-out infinite}
.orb-aura-wrap.speaking .orb-aura-3{inset:-50px;opacity:0.65;background:radial-gradient(circle at 45% 45%,rgba(232,144,64,0.22) 0%,transparent 50%),radial-gradient(circle at 55% 60%,rgba(16,184,112,0.35) 0%,transparent 50%);animation:aura-drift-3 6s ease-in-out infinite,aura-speak-pulse 3s ease-in-out infinite reverse}
/* Idle — auras shrink, dim */
.orb-aura-wrap.idle .orb-aura-1{inset:15px;opacity:0.3;animation-duration:14s,10s}
.orb-aura-wrap.idle .orb-aura-2{inset:10px;opacity:0.2;animation-duration:16s,12s}
.orb-aura-wrap.idle .orb-aura-3{inset:0px;opacity:0.1;animation-duration:20s,14s}
/* Light theme auras */
[data-theme="light"] .orb-aura-1{background:radial-gradient(circle at 35% 40%,rgba(4,107,62,0.14) 0%,transparent 65%),radial-gradient(circle at 70% 30%,rgba(160,96,24,0.08) 0%,transparent 60%),radial-gradient(circle at 50% 75%,rgba(5,138,78,0.10) 0%,transparent 60%)}
[data-theme="light"] .orb-aura-2{background:radial-gradient(circle at 60% 35%,rgba(5,138,78,0.10) 0%,transparent 55%),radial-gradient(circle at 30% 65%,rgba(4,107,62,0.14) 0%,transparent 60%),radial-gradient(circle at 75% 70%,rgba(160,96,24,0.08) 0%,transparent 50%)}
[data-theme="light"] .orb-aura-3{background:radial-gradient(circle at 45% 45%,rgba(160,96,24,0.08) 0%,transparent 50%),radial-gradient(circle at 55% 60%,rgba(4,107,62,0.14) 0%,transparent 50%)}
[data-theme="light"] .orb-aura-wrap.speaking .orb-aura-1{background:radial-gradient(circle at 35% 40%,rgba(4,107,62,0.28) 0%,transparent 65%),radial-gradient(circle at 70% 30%,rgba(160,96,24,0.18) 0%,transparent 60%),radial-gradient(circle at 50% 75%,rgba(5,138,78,0.22) 0%,transparent 60%)}
[data-theme="light"] .orb-aura-wrap.speaking .orb-aura-2{background:radial-gradient(circle at 60% 35%,rgba(5,138,78,0.22) 0%,transparent 55%),radial-gradient(circle at 30% 65%,rgba(4,107,62,0.28) 0%,transparent 60%),radial-gradient(circle at 75% 70%,rgba(160,96,24,0.18) 0%,transparent 50%)}
[data-theme="light"] .orb-aura-wrap.speaking .orb-aura-3{background:radial-gradient(circle at 45% 45%,rgba(160,96,24,0.18) 0%,transparent 50%),radial-gradient(circle at 55% 60%,rgba(4,107,62,0.28) 0%,transparent 50%)}
/* Sphere */
.orb-sphere{position:relative;width:160px;height:160px;border-radius:50%;background:rgba(10,14,15,0.35);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);box-shadow:inset 0 0 35px rgba(16,184,112,0.40),inset 0 -12px 35px rgba(0,0,0,0.35);z-index:10;overflow:hidden;animation:orb-float 6s ease-in-out infinite;transition:width 0.6s ease,height 0.6s ease,opacity 0.6s ease}
.orb-sphere.speaking{width:190px;height:190px;animation:orb-float-speak 3s ease-in-out infinite}
.orb-sphere.listening{width:165px;height:165px}
.orb-sphere.idle{width:140px;height:140px;opacity:0.7}
[data-theme="light"] .orb-sphere{background:rgba(248,250,248,0.3);box-shadow:inset 0 0 35px rgba(4,107,62,0.35),inset 0 -12px 35px rgba(0,0,0,0.06)}
/* Lava inside sphere */
.orb-lava{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:95%;height:95%;border-radius:50%;filter:blur(20px);mix-blend-mode:screen;animation:orb-hue-shift 24s infinite linear;transition:filter 0.6s}
.orb-lava::before{content:'';position:absolute;inset:-15%;border-radius:50%;background:radial-gradient(circle at 25% 30%,#0A8050 0%,transparent 50%),radial-gradient(circle at 75% 25%,#E89040 0%,transparent 45%),radial-gradient(circle at 50% 70%,#10B870 0%,transparent 50%),radial-gradient(circle at 80% 65%,#C87830 0%,transparent 40%),radial-gradient(circle at 20% 70%,#0E9A5E 0%,transparent 45%);filter:blur(6px);mix-blend-mode:screen;animation:orb-lava-rotate 12s linear infinite}
.orb-lava::after{content:'';position:absolute;inset:-10%;border-radius:50%;background:radial-gradient(circle at 35% 40%,#18D080 0%,transparent 40%),radial-gradient(circle at 65% 35%,#0A8050 0%,transparent 40%),radial-gradient(circle at 45% 65%,#E89040 0%,transparent 40%),radial-gradient(circle at 75% 55%,#10B870 0%,transparent 35%);filter:blur(10px);mix-blend-mode:screen;animation:orb-lava-pulse 5s ease-in-out infinite alternate}
.orb-sphere.speaking .orb-lava{filter:blur(16px);animation:orb-hue-shift-fast 10s infinite linear}
.orb-sphere.speaking .orb-lava::before{animation:orb-lava-rotate 5s linear infinite}
.orb-sphere.speaking .orb-lava::after{animation:orb-lava-pulse 2s ease-in-out infinite alternate}
.orb-sphere.idle .orb-lava{filter:blur(26px);opacity:0.6;animation:orb-hue-shift 40s infinite linear}
.orb-sphere.idle .orb-lava::before{animation:orb-lava-rotate 20s linear infinite}
[data-theme="light"] .orb-lava::before{background:radial-gradient(circle at 25% 30%,#035830 0%,transparent 50%),radial-gradient(circle at 75% 25%,#A06018 0%,transparent 45%),radial-gradient(circle at 50% 70%,#046B3E 0%,transparent 50%),radial-gradient(circle at 80% 65%,#9A5A18 0%,transparent 40%),radial-gradient(circle at 20% 70%,#058A4E 0%,transparent 45%)}
[data-theme="light"] .orb-lava::after{background:radial-gradient(circle at 35% 40%,#068848 0%,transparent 40%),radial-gradient(circle at 65% 35%,#035830 0%,transparent 40%),radial-gradient(circle at 45% 65%,#A06018 0%,transparent 40%),radial-gradient(circle at 75% 55%,#046B3E 0%,transparent 35%)}
/* Aura keyframes */
@keyframes aura-drift-1{0%,100%{transform:translate(0,0) rotate(0deg)}33%{transform:translate(8px,-6px) rotate(5deg)}66%{transform:translate(-6px,4px) rotate(-3deg)}}
@keyframes aura-drift-2{0%,100%{transform:translate(0,0) rotate(0deg)}33%{transform:translate(-10px,5px) rotate(-4deg)}66%{transform:translate(7px,-8px) rotate(6deg)}}
@keyframes aura-drift-3{0%,100%{transform:translate(0,0)}50%{transform:translate(5px,-5px)}}
@keyframes aura-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes aura-breathe-alt{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes aura-speak-pulse{0%,100%{transform:scale(1);opacity:0.7}25%{transform:scale(1.12);opacity:1}50%{transform:scale(0.97);opacity:0.6}75%{transform:scale(1.08);opacity:0.9}}
@keyframes aura-speak-pulse-alt{0%,100%{transform:scale(1);opacity:0.65}30%{transform:scale(1.15);opacity:0.95}60%{transform:scale(0.95);opacity:0.55}85%{transform:scale(1.1);opacity:0.85}}
/* Sphere keyframes */
@keyframes orb-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes orb-float-speak{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-5px) scale(1.03)}60%{transform:translateY(-2px) scale(0.98)}80%{transform:translateY(-7px) scale(1.02)}}
@keyframes orb-hue-shift{0%{filter:blur(20px) hue-rotate(0deg)}100%{filter:blur(20px) hue-rotate(360deg)}}
@keyframes orb-hue-shift-fast{0%{filter:blur(16px) hue-rotate(0deg)}100%{filter:blur(16px) hue-rotate(360deg)}}
@keyframes orb-lava-rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes orb-lava-pulse{0%{transform:scale(1);opacity:0.85}100%{transform:scale(1.12);opacity:1}}
@media(prefers-reduced-motion:reduce){.orb-sphere,.orb-lava,.orb-lava::before,.orb-lava::after,.orb-aura-1,.orb-aura-2,.orb-aura-3{animation:none!important}}
/* Accessibility */
button:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:100px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.voice-status-label{font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);transition:color 0.4s;margin-top:-12px;text-align:center;z-index:1}
.voice-status-label.speaking{color:var(--accent)}
.voice-status-label.listening{color:var(--accent)}
/* Transcript overlay */
.voice-transcript-overlay{position:absolute;inset:0;z-index:10;background:rgba(8,9,15,0.92);backdrop-filter:blur(20px);display:none;flex-direction:column;overflow-y:auto;padding:16px 16px 8px;animation:fade-up 0.25s ease}
[data-theme="light"] .voice-transcript-overlay{background:rgba(244,239,232,0.94)}
.voice-transcript-overlay.active{display:flex}
.voice-transcript-title{font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent-dim);margin-bottom:10px;padding-left:2px}
.voice-controls{flex-shrink:0;padding:10px 20px 12px;display:flex;flex-direction:column;align-items:center;gap:10px;position:relative;z-index:5}
.transcript-toggle{padding:5px 14px;border-radius:100px;border:1px solid var(--border-2);background:transparent;cursor:pointer;font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);transition:all 0.2s;font-family:'DM Sans',sans-serif}
.transcript-toggle.on{background:rgba(196,214,232,0.08);color:var(--accent);border-color:var(--accent-dim)}
.voice-btn-row{display:flex;align-items:center;justify-content:center;gap:28px}

  <div class="text-input-area"><div class="input-wrap"><textarea class="chat-textarea" id="chat-textarea" placeholder="Ask anything…" rows="1"></textarea><button class="btn-send" id="btn-send" disabled><svg width="14" height="14" viewBox="0 0 18 18" fill="currentColor"><path d="M16 9L2 2L5.5 9L2 16L16 9Z"/></svg></button></div><button class="btn-cam-text" id="text-cam"><svg width="18" height="16" viewBox="0 0 18 16" fill="currentColor"><path d="M6.5 1L5 3H2C1.4 3 1 3.4 1 4V13C1 13.6 1.4 14 2 14H16C16.6 14 17 13.6 17 13V4C17 3.4 16.6 3 16 3H13L11.5 1H6.5ZM9 11.5C7.1 11.5 5.5 9.9 5.5 8C5.5 6.1 7.1 4.5 9 4.5C10.9 4.5 12.5 6.1 12.5 8C12.5 9.9 10.9 11.5 9 11.5Z"/></svg></button></div>
  <div class="bottom-tabs"><button class="tab-btn" data-mode="voice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z" fill="currentColor" opacity=".15"/><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/><path d="M19 10c0 3.87-3.13 7-7 7s-7-3.13-7-7"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span class="tab-label">Voice</span></button><button class="tab-btn active" data-mode="text"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="currentColor" opacity=".15"/><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="tab-label">Text</span></button></div>
</div>

<!-- CAMERA VIEW -->
<div class="view" id="view-camera"><div class="camera-view">
  <div class="camera-feed"><video id="cameraVideo" autoplay playsinline muted></video><div class="camera-placeholder" id="camera-placeholder"><div class="artifact-ghost"></div></div><div class="grid-lines"><div class="grid-h" style="top:33%"></div><div class="grid-h" style="top:66%"></div><div class="grid-v" style="left:33%"></div><div class="grid-v" style="left:66%"></div></div></div>
  <div class="focus-brackets"><div class="bracket tl"></div><div class="bracket tr"></div><div class="bracket bl"></div><div class="bracket br"></div></div>
  <div class="scan-line"></div>
  <div class="camera-top">
    <button class="cam-btn" id="cam-back"><svg width="8" height="13" viewBox="0 0 8 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 1L1 6.5L7 12"/></svg></button>
    <div class="cam-chips"><div class="cam-listening-pill" id="cam-listen-pill"><span class="cam-listen-dot"></span><div class="cam-listen-wave"><span></span><span></span><span></span><span></span><span></span></div><span class="cam-listen-label">Mic on · Listening</span></div><div class="cam-streaming-pill" id="cam-stream-pill"><span class="cam-stream-dot"></span><span class="cam-stream-label">Streaming</span></div></div>
    <button class="cam-gallery-btn empty" id="cam-gallery-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21"/></svg><span class="gallery-badge" id="gallery-badge" style="display:none">0</span></button>
  </div>
  <div class="camera-bottom">
    <div class="cam-mode-toggle"><button class="cam-mode-btn active-stream" id="cam-mode-stream">Stream</button><button class="cam-mode-btn" id="cam-mode-capture">Capture</button></div>
    <div class="cam-action-row">
      <button class="cam-flip-btn" id="cam-flip"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg></button>
      <button class="cam-shutter" id="cam-shutter"><svg class="cam-shutter-ring" id="cam-ring" viewBox="0 0 80 80" style="display:none"><circle cx="40" cy="40" r="37" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/><circle cx="40" cy="40" r="37" fill="none" stroke="#E89040" stroke-width="3" stroke-linecap="round" id="cam-ring-arc" stroke-dasharray="0 232"/></svg><div class="cam-shutter-inner"></div></button>
      <div style="width:44px;height:44px"></div>
    </div>
    <span class="cam-hint" id="cam-hint">Tap to stream 15s</span>
  </div>
  <div class="gallery-overlay" id="gallery-overlay" style="display:none"><div class="gallery-header"><span class="gallery-title" id="gallery-title">Gallery (0)</span><button class="gallery-done" id="gallery-done">Done</button></div><div class="gallery-grid" id="gallery-grid"><div class="gallery-empty">No photos yet</div></div></div>
</div></div>
</div>

<script type="module">
import{startAudioPlayerWorklet}from"./js/audio-player.js";
import{startAudioRecorderWorklet}from"./js/audio-recorder.js";

/* ── THEME ──────────────────────────────────────────────────── */
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');document.querySelectorAll('.theme-word').forEach(e=>e.textContent=d?'Light':'Dark')}
document.getElementById('theme-toggle-v').addEventListener('click',toggleTheme);
document.getElementById('theme-toggle-t').addEventListener('click',toggleTheme);

/* ── STATE ─────────────────────────────────────────────────────── */
let userId=localStorage.getItem('horizon_visitor_id');if(!userId){userId='visitor-'+crypto.randomUUID();localStorage.setItem('horizon_visitor_id',userId)}
let sessionId=sessionStorage.getItem('horizon_session_id');if(!sessionId){sessionId='tour-'+crypto.randomUUID();sessionStorage.setItem('horizon_session_id',sessionId)}
let ws=null,audioPlayerNode=null,audioPlayerCtx=null,audioRecorderNode=null,audioRecorderCtx=null,micStream=null;
let currentMsgId=null,currentBubbleEl=null,currentOutTxId=null,currentOutTxEl=null,inTxFinished=false;
let lastAuthor=null,handoffDone=false;
let appMode='voice',micOn=false,showTranscript=false,camMode='stream',cameraFromMode='voice';
let photos=[],recaptchaSiteKey='';
let orbState='idle'; // orb animation state

/* ── DOM ───────────────────────────────────────────────────────── */
const messagesDiv=document.getElementById('messages'),textarea=document.getElementById('chat-textarea'),btnSend=document.getElementById('btn-send');
const connDot=document.getElementById('conn-dot'),connLabel=document.getElementById('conn-label'),connDotT=document.getElementById('conn-dot-t'),connLabelT=document.getElementById('conn-label-t');
const loadingScreen=document.getElementById('loading-screen'),loadingStatus=document.getElementById('loading-status'),loadingDots=document.getElementById('loading-dots');
const listeningStrip=document.getElementById('listening-strip');
const voiceStatusLabel=document.getElementById('voice-status-label');
const voiceTxOverlay=document.getElementById('voice-transcript-overlay'),voiceTxHolder=document.getElementById('voice-transcript-holder');
const transcriptToggle=document.getElementById('transcript-toggle');
const voiceMicBtn=document.getElementById('voice-mic'),micLabel=document.getElementById('mic-label');
const orbAuraWrap=document.getElementById('orb-aura-wrap'),orbSphere=document.getElementById('orb-sphere');

/* ── VOICE ORB (CSS class-driven) ──────────────────────────────── */
function setOrbState(s){
  orbState=s;
  orbAuraWrap.className='orb-aura-wrap '+s;
  orbSphere.className='orb-sphere '+s;
  voiceStatusLabel.textContent=s==='speaking'?'Guide is speaking':s==='listening'?'Listening…':'Tap mic to begin';
  voiceStatusLabel.className='voice-status-label'+(s==='speaking'?' speaking':s==='listening'?' listening':'');
}

/* ── ENTRY GATE ────────────────────────────────────────────────── */
(async function(){const gate=document.getElementById('entry-gate'),btn=document.getElementById('gate-btn'),err=document.getElementById('gate-error');
try{const c=await fetch('/config').then(r=>r.json());recaptchaSiteKey=c.recaptcha_site_key||'';if(recaptchaSiteKey)await new Promise((r,j)=>{const s=document.createElement('script');s.src=`https://www.google.com/recaptcha/api.js?render=${recaptchaSiteKey}`;s.onload=r;s.onerror=j;document.head.appendChild(s)})}catch(e){console.warn('reCAPTCHA fail:',e)}
btn.disabled=false;
async function tryEnter(){btn.disabled=true;btn.textContent='Verifying…';err.textContent='';
try{let v=true;if(recaptchaSiteKey&&window.grecaptcha){const t=await grecaptcha.execute(recaptchaSiteKey,{action:'enter_museum'});v=(await fetch('/verify-recaptcha',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})}).then(r=>r.json())).success}
if(v){await ensurePlayer();gate.style.opacity='0';setTimeout(()=>{gate.remove();loadingScreen.style.display='flex'},400);connect()}
else{err.textContent='Verification failed';btn.disabled=false;btn.textContent='Start Exploring'}}
catch(e){await ensurePlayer();gate.style.opacity='0';setTimeout(()=>{gate.remove();loadingScreen.style.display='flex'},400);connect()}}
btn.addEventListener('click',tryEnter)})();

/* ── WEBSOCKET ─────────────────────────────────────────────────── */
function connect(){const p=location.protocol==='https:'?'wss:':'ws:';ws=new WebSocket(`${p}//${location.host}/ws/${userId}/${sessionId}`);ws.binaryType='arraybuffer';
ws.onopen=()=>{setConnected(true);btnSend.disabled=false;loadingStatus.textContent='Almost ready…'};
ws.onmessage=e=>{if(e.data instanceof ArrayBuffer){if(audioPlayerNode)audioPlayerNode.port.postMessage(e.data);return}let d;try{d=JSON.parse(e.data)}catch{return}
if(d.type==='error'){addSystem(d.message||'Error');if(d.terminal)setConnected(false);return}if(d.type==='ready'){transitionToChat();return}if(d.type==='exhibit_identified')return;handleEvent(d)};
ws.onclose=()=>{setConnected(false);btnSend.disabled=true;const il=loadingScreen.style.display!=='none'&&loadingScreen.style.opacity!=='0';if(il)loadingStatus.textContent='Reconnecting…';else addSystem('Connection lost — reconnecting…');setTimeout(connect,3000)};
ws.onerror=()=>setConnected(false)}
function transitionToChat(){loadingStatus.textContent='Ready';loadingStatus.classList.add('ready');loadingDots.classList.add('hidden');setTimeout(()=>{loadingScreen.style.opacity='0';setTimeout(()=>{loadingScreen.style.display='none'},500)},400)}
function setConnected(v){const t=v?'Active':'Reconnecting…';connDot.classList.toggle('disconnected',!v);connLabel.textContent=t;connDotT.classList.toggle('disconnected',!v);connLabelT.textContent=t}

/* ── MODE SWITCHING ────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{const m=b.dataset.mode;if(m===appMode)return;appMode=m;
if(m==='voice'){syncVoiceMic();syncListeningStrip();moveMessagesBack()}else{stopMic();micOn=false;moveMessagesBack()}
switchView(m==='voice'?'voice':'text')}));
function switchView(v){document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));document.getElementById('view-'+v).classList.add('active');
document.querySelectorAll('.tab-btn').forEach(t=>t.classList.toggle('active',t.dataset.mode===appMode));syncListeningStrip();if(v!=='camera'&&cameraStream)stopCameraStream()}
function syncListeningStrip(){if(appMode==='voice'&&micOn)listeningStrip.classList.add('active');else listeningStrip.classList.remove('active')}

// Move messagesDiv between voice transcript overlay and text view
function moveMessagesToVoice(){voiceTxHolder.appendChild(messagesDiv);messagesDiv.style.display='';scroll()}
function moveMessagesBack(){
  // Put messagesDiv back into text view (before the input area)
  const inputArea=document.querySelector('#view-text .text-input-area');
  if(inputArea)document.getElementById('view-text').insertBefore(messagesDiv,inputArea);
  messagesDiv.style.display='';scroll();
}

/* ── VOICE CONTROLS ────────────────────────────────────────────── */
const MIC_SVG_ON='<svg width="24" height="31" viewBox="0 0 16 22" fill="currentColor"><rect x="4" y="1" width="8" height="13" rx="4"/><path d="M1 10C1 14.4 4.1 18 8 18C11.9 18 15 14.4 15 10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><line x1="8" y1="18" x2="8" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="21" x2="11" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
const MIC_SVG_OFF='<svg width="24" height="31" viewBox="0 0 16 22" fill="currentColor"><rect x="4" y="1" width="8" height="13" rx="4"/><path d="M1 10C1 14.4 4.1 18 8 18C11.9 18 15 14.4 15 10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><line x1="8" y1="18" x2="8" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="21" x2="11" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="2" x2="14" y2="20" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"/></svg>';
voiceMicBtn.addEventListener('click',()=>{micOn=!micOn;if(micOn){ensureMic();setOrbState('listening')}else{stopMic();setOrbState('idle')}syncVoiceMic();syncListeningStrip()});
function syncVoiceMic(){voiceMicBtn.classList.toggle('mic-on',micOn);voiceMicBtn.classList.toggle('mic-off',!micOn);voiceMicBtn.innerHTML=micOn?MIC_SVG_ON:MIC_SVG_OFF;micLabel.textContent=micOn?'Mute':'Unmute';micLabel.style.color=micOn?'':'var(--red)'}

// Transcript toggle — moves messagesDiv into/out of voice overlay
transcriptToggle.addEventListener('click',()=>{showTranscript=!showTranscript;
if(showTranscript){moveMessagesToVoice();voiceTxOverlay.classList.add('active')}
else{voiceTxOverlay.classList.remove('active');moveMessagesBack()}
transcriptToggle.textContent=showTranscript?'Hide transcript':'Show transcript';transcriptToggle.classList.toggle('on',showTranscript)});

document.getElementById('voice-cam').addEventListener('click',()=>{cameraFromMode='voice';openCamera('stream')});
document.getElementById('text-cam').addEventListener('click',()=>{cameraFromMode='text';openCamera('capture')});

/* ── TEXT INPUT ─────────────────────────────────────────────────── */
textarea.addEventListener('input',()=>{textarea.style.height='auto';textarea.style.height=Math.min(textarea.scrollHeight,140)+'px'});
textarea.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend()}});
btnSend.addEventListener('click',handleSend);
function handleSend(){const t=textarea.value.trim();if(!t||!ws||ws.readyState!==WebSocket.OPEN)return;if(audioPlayerNode)audioPlayerNode.port.postMessage({command:'endOfAudio'});clearPartials();appendBubble('visitor',null,t);ws.send(JSON.stringify({type:'text',text:t}));textarea.value='';textarea.style.height=''}

/* ── HANDOFF ───────────────────────────────────────────────────── */
function checkAuthorChange(a){if(!a)return true;if(handoffDone&&a==='concierge_agent')return false;if(a!==lastAuthor){if(lastAuthor!==null){insertHandoffCard(a);if(lastAuthor==='concierge_agent')handoffDone=true}currentMsgId=null;currentBubbleEl=null;currentOutTxId=null;currentOutTxEl=null;lastAuthor=a}return true}

/* ── EVENT HANDLER ─────────────────────────────────────────────── */
function handleEvent(ev){
if(ev.turnComplete){finalisePartials();currentMsgId=null;currentBubbleEl=null;currentOutTxId=null;currentOutTxEl=null;inTxFinished=false;if(micOn)setOrbState('listening');return}
if(ev.interrupted){if(audioPlayerNode)audioPlayerNode.port.postMessage({command:'endOfAudio'});[currentBubbleEl,currentOutTxEl].forEach(el=>{if(el){removeTypingIndicator(el);el.classList.add('interrupted')}});currentMsgId=null;currentBubbleEl=null;currentOutTxId=null;currentOutTxEl=null;inTxFinished=false;if(micOn)setOrbState('listening');return}
// Visitor transcription — always add to shared messagesDiv
if(ev.inputTranscription?.text){const{text,finished}=ev.inputTranscription;if(inTxFinished)return;if(finished){appendBubble('visitor',null,text,false);inTxFinished=true;scroll()}}
// Agent output transcription — always add to shared messagesDiv + drive orb
if(ev.outputTranscription?.text){const{text,finished}=ev.outputTranscription;if(!inTxFinished)inTxFinished=true;
setOrbState('speaking');
if(!checkAuthorChange(ev.author))return;
if(!currentOutTxId){currentOutTxId=uid();currentOutTxEl=appendBubble('agent',agentLabel(ev.author),text,!finished);currentOutTxEl.classList.add('transcription')}
else{const p=currentOutTxEl.querySelector('.bubble-text').textContent;updateBubble(currentOutTxEl,finished?text:p+text,!finished)}
if(finished){currentOutTxId=null;currentOutTxEl=null}scroll()}
// Agent content parts — always to shared messagesDiv + play audio
if(ev.content?.parts){if(!inTxFinished)inTxFinished=true;
if(!checkAuthorChange(ev.author))return;
for(const part of ev.content.parts){
  if(part.inlineData?.mimeType?.startsWith('audio/pcm')&&audioPlayerNode){audioPlayerNode.port.postMessage(base64ToArray(part.inlineData.data));setOrbState('speaking')}
  if(part.text){if(!currentMsgId){currentMsgId=uid();currentBubbleEl=appendBubble('agent',agentLabel(ev.author),part.text,true)}else{const p=currentBubbleEl.querySelector('.bubble-text').textContent;updateBubble(currentBubbleEl,p+part.text,true)}scroll()}}}}

/* ── HELPERS ────────────────────────────────────────────────────── */
function agentLabel(a){if(!a)return'Guide';if(a==='concierge_agent')return'Concierge';if(a==='tour_guide_agent')return'Tour Guide';return'Guide'}
function insertHandoffCard(a){const n=a==='tour_guide_agent'?'Tour Guide':'Concierge';const el=document.createElement('div');el.className='handoff-card';el.innerHTML=`<div class="handoff-icon"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1L12 3.8V9.2L6.5 12L1 9.2V3.8L6.5 1Z" stroke="var(--accent)" stroke-width="1.2" opacity=".75"/><circle cx="6.5" cy="6.5" r="2" fill="var(--accent)" opacity=".6"/></svg></div><div><div class="handoff-title">Connecting to ${n}</div><div class="handoff-desc">Handing you to our specialist now</div></div>`;messagesDiv.appendChild(el);scroll()}
function appendBubble(role,label,text,partial=false){const w=document.createElement('div');w.className=`bubble ${role}`;if(label&&role==='agent'){const l=document.createElement('span');l.className='agent-label';l.textContent=label;w.appendChild(l)}const b=document.createElement('div');b.className='bubble-body';const p=document.createElement('p');p.className='bubble-text';p.textContent=text;if(partial&&role==='agent')p.appendChild(mkEl('span','typing-indicator'));b.appendChild(p);w.appendChild(b);messagesDiv.appendChild(w);scroll();return w}
function appendPhotoBubble(u){const w=document.createElement('div');w.className='bubble visitor';const b=document.createElement('div');b.className='bubble-body photo-body';const i=document.createElement('img');i.className='bubble-photo';i.src=u;i.alt='Captured';b.appendChild(i);w.appendChild(b);messagesDiv.appendChild(w);scroll()}
function updateBubble(el,text,partial){const p=el.querySelector('.bubble-text');removeTypingIndicator(el);p.textContent=text;if(partial)p.appendChild(mkEl('span','typing-indicator'))}
function removeTypingIndicator(el){el?.querySelector('.typing-indicator')?.remove()}
function finalisePartials(){[currentBubbleEl,currentOutTxEl].forEach(el=>{if(el)removeTypingIndicator(el)})}
function clearPartials(){finalisePartials();currentMsgId=null;currentBubbleEl=null;currentOutTxId=null;currentOutTxEl=null;inTxFinished=false}
function addSystem(t){const d=mkEl('div','system-message');d.textContent=t;messagesDiv.appendChild(d);scroll()}
function scroll(){messagesDiv.scrollTop=messagesDiv.scrollHeight}
function uid(){return Math.random().toString(36).substring(7)}
function mkEl(tag,cls){const e=document.createElement(tag);e.className=cls;return e}

/* ── AUDIO ─────────────────────────────────────────────────────── */
async function ensurePlayer(){if(audioPlayerNode)return;try{const[n,c]=await startAudioPlayerWorklet();audioPlayerNode=n;audioPlayerCtx=c;if(audioPlayerCtx.state==='suspended')await audioPlayerCtx.resume()}catch(e){console.warn('Audio player fail:',e.message)}}
async function ensureMic(){if(micStream)return;try{const[n,c,s]=await startAudioRecorderWorklet(pcm=>{if(ws?.readyState===WebSocket.OPEN)try{ws.send(pcm)}catch(e){}});audioRecorderNode=n;audioRecorderCtx=c;micStream=s}catch(e){addSystem('Microphone error: '+e.message);micOn=false;syncVoiceMic();syncListeningStrip()}}
function stopMic(){if(audioRecorderNode)try{audioRecorderNode.disconnect()}catch(e){}if(audioRecorderCtx)try{audioRecorderCtx.close()}catch(e){}if(micStream)micStream.getTracks().forEach(t=>t.stop());audioRecorderNode=null;audioRecorderCtx=null;micStream=null}
function base64ToArray(b){let s=b.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';const n=atob(s),u=new Uint8Array(n.length);for(let i=0;i<n.length;i++)u[i]=n.charCodeAt(i);return u.buffer}

/* ── CAMERA ────────────────────────────────────────────────────── */
const cameraVideo=document.getElementById('cameraVideo'),cameraPlaceholder=document.getElementById('camera-placeholder');
let cameraStream=null,facingMode='environment',camStreaming=false,camStreamInterval=null,camStreamStart=null,camStreamRaf=null;

function openCamera(defaultMode){camMode=defaultMode||'stream';syncCamMode();switchView('camera');startCameraStream();ensurePlayer();ensureMic();micOn=true;syncCamListenPill()}
async function startCameraStream(){if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null}try{cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1280},height:{ideal:720}}});cameraVideo.srcObject=cameraStream;cameraVideo.classList.add('active');cameraPlaceholder.style.display='none'}catch(e){addSystem('Camera unavailable');closeCamera()}}
function stopCameraStream(){if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null}cameraVideo.srcObject=null;cameraVideo.classList.remove('active');cameraPlaceholder.style.display='flex'}
function closeCamera(){stopVideoStream();stopCameraStream();switchView(appMode==='voice'?'voice':'text');if(appMode==='voice'&&micOn)ensureMic();syncListeningStrip()}
function sendVideoFrame(){if(!cameraStream||!cameraVideo.videoWidth||ws?.readyState!==WebSocket.OPEN)return;const c=document.createElement('canvas');c.width=768;c.height=768;c.getContext('2d').drawImage(cameraVideo,0,0,768,768);c.toBlob(b=>{if(!b)return;const r=new FileReader();r.onloadend=()=>{try{if(ws?.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'image',data:r.result.split(',')[1],mimeType:'image/jpeg'}))}catch(e){}};r.readAsDataURL(b)},'image/jpeg',0.85)}

// Mode toggle
const camModeStream=document.getElementById('cam-mode-stream'),camModeCapture=document.getElementById('cam-mode-capture');
camModeStream.addEventListener('click',()=>{camMode='stream';syncCamMode();ensureMic();micOn=true;syncCamListenPill()});
camModeCapture.addEventListener('click',()=>{camMode='capture';stopVideoStream();syncCamMode();syncCamListenPill()});
function syncCamMode(){camModeStream.className='cam-mode-btn'+(camMode==='stream'?' active-stream':'');camModeCapture.className='cam-mode-btn'+(camMode==='capture'?' active-capture':'');document.getElementById('cam-hint').textContent=camMode==='stream'?'Tap to stream 15s':'Tap to capture'}
function syncCamListenPill(){document.getElementById('cam-listen-pill').style.display=camMode==='stream'?'flex':'none'}

// Shutter
const camShutter=document.getElementById('cam-shutter'),camRing=document.getElementById('cam-ring'),camRingArc=document.getElementById('cam-ring-arc');
camShutter.addEventListener('click',()=>{if(camMode==='capture')doCapture();else if(!camStreaming)startVideoStream();else stopVideoStream()});
function doCapture(){if(!cameraStream||!cameraVideo.videoWidth)return;
const cv=cameraVideo.closest('.camera-view');const flash=document.createElement('div');flash.className='shutter-flash';cv.appendChild(flash);setTimeout(()=>flash.remove(),400);
const can=document.createElement('canvas'),ratio=cameraVideo.videoHeight/cameraVideo.videoWidth;can.width=768;can.height=Math.round(768*ratio);can.getContext('2d').drawImage(cameraVideo,0,0,can.width,can.height);const dataUrl=can.toDataURL('image/jpeg',0.85);
if(ws?.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'image',data:dataUrl.split(',')[1]}));
photos.push(dataUrl);syncGalleryBadge();
appendPhotoBubble(dataUrl);
const fly=document.createElement('div');fly.className='photo-fly';fly.style.backgroundImage=`url(${dataUrl})`;cv.appendChild(fly);setTimeout(()=>fly.remove(),1200);
if(cameraFromMode==='text'){setTimeout(closeCamera,1300)}}
function startVideoStream(){camStreaming=true;camStreamStart=Date.now();camShutter.classList.add('streaming');camRing.style.display='';
document.getElementById('cam-stream-pill').classList.add('visible');document.getElementById('cam-hint').textContent='Tap to stop';
sendVideoFrame();camStreamInterval=setInterval(sendVideoFrame,2000);
(function tick(){const f=Math.min((Date.now()-camStreamStart)/15000,1);camRingArc.setAttribute('stroke-dasharray',`${f*232} 232`);if(f<1&&camStreaming)camStreamRaf=requestAnimationFrame(tick);else if(f>=1)stopVideoStream()})()}
function stopVideoStream(){camStreaming=false;if(camStreamInterval){clearInterval(camStreamInterval);camStreamInterval=null}if(camStreamRaf){cancelAnimationFrame(camStreamRaf);camStreamRaf=null}
camShutter.classList.remove('streaming');camRing.style.display='none';camRingArc.setAttribute('stroke-dasharray','0 232');
document.getElementById('cam-stream-pill').classList.remove('visible');document.getElementById('cam-hint').textContent=camMode==='stream'?'Tap to stream 15s':'Tap to capture'}

// Gallery
function syncGalleryBadge(){const b=document.getElementById('cam-gallery-btn'),g=document.getElementById('gallery-badge');if(photos.length>0){b.classList.remove('empty');g.style.display='flex';g.textContent=photos.length}else{b.classList.add('empty');g.style.display='none'}}
document.getElementById('cam-gallery-btn').addEventListener('click',()=>{const o=document.getElementById('gallery-overlay');o.style.display='flex';document.getElementById('gallery-title').textContent=`Gallery (${photos.length})`;const g=document.getElementById('gallery-grid');g.innerHTML='';if(!photos.length){g.innerHTML='<div class="gallery-empty">No photos yet</div>';return}photos.forEach(u=>{const d=document.createElement('div');d.className='gallery-thumb';const i=document.createElement('img');i.src=u;d.appendChild(i);g.appendChild(d);d.addEventListener('click',()=>openPhotoFullview(u))})});
function openPhotoFullview(url){const cv=document.querySelector('.camera-view');const fv=document.createElement('div');fv.className='gallery-fullview';fv.innerHTML=`<img src="${url}"/><button class="gallery-fullview-close">✕</button>`;cv.appendChild(fv);fv.addEventListener('click',e=>{if(e.target===fv||e.target.classList.contains('gallery-fullview-close'))fv.remove()})}
document.getElementById('gallery-done').addEventListener('click',()=>{document.getElementById('gallery-overlay').style.display='none'});
document.getElementById('cam-flip').addEventListener('click',()=>{facingMode=facingMode==='environment'?'user':'environment';startCameraStream()});
document.getElementById('cam-back').addEventListener('click',closeCamera);
</script>
</body>
</html>
